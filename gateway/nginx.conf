# ============================================================
# Temuin Production Gateway (Sprint 7 - DEC-021, DEC-022, DEC-023)
# ============================================================
# Single entry point for the microservices stack. Mounted into
# nginx:alpine at /etc/nginx/conf.d/default.conf (i.e. inside the
# main nginx.conf http{} block), so http-context directives like
# limit_req_zone / map / upstream / log_format live here directly.
#
# Responsibilities:
#   - Reverse proxy /api/* to the 3 FastAPI services, / to frontend
#   - Rate limiting (DEC-023): auth_zone 5r/s burst 10, general 30r/s
#   - Correlation ID (DEC-022): forward client header or generate one
#   - Reliability (DEC-021): proxy_next_upstream for transient 5xx
# ============================================================

# ---- Rate limiting zones (DEC-023) ----
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general_zone:10m rate=30r/s;
limit_req_status 429;

# ---- Correlation ID (DEC-022) ----
# Use client-supplied X-Correlation-ID when present, else nginx $request_id.
map $http_x_correlation_id $cid_source {
    default $http_x_correlation_id;
    ""      $request_id;
}
# Trim to 12 characters for compact cross-service tracing.
map $cid_source $correlation_id {
    "~^(.{12})" $1;
    default     $cid_source;
}

# ---- Structured access log with correlation id ----
log_format gateway escape=json
    '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"duration_ms":$request_time,'
    '"upstream":"$upstream_addr",'
    '"correlation_id":"$correlation_id"'
    '}';

# ---- Upstreams ----
upstream auth_upstream       { server auth-service:8001; }
upstream item_upstream       { server item-service:8002; }
upstream engagement_upstream { server engagement-service:8003; }
upstream frontend_upstream   { server frontend:80; }

server {
    listen 8080;
    server_name _;

    access_log /var/log/nginx/access.log gateway;

    # ---- Common proxy behaviour (inherited by all locations) ----
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Correlation-ID $correlation_id;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;

    # Surface correlation id back to the client for debugging (DEC-022)
    add_header X-Correlation-ID $correlation_id always;

    # ============================================================
    # AUTH SERVICE  (/api/auth/* -> auth-service:8001/auth/*)
    # ============================================================
    # Tighter rate limit on auth-sensitive endpoints (DEC-023).
    location = /api/auth/login {
        limit_req zone=auth_zone burst=10;
        proxy_pass http://auth_upstream/auth/login;
    }
    location = /api/auth/register {
        limit_req zone=auth_zone burst=10;
        proxy_pass http://auth_upstream/auth/register;
    }
    location = /api/auth/health {
        proxy_pass http://auth_upstream/health;
    }
    location = /api/auth/metrics {
        proxy_pass http://auth_upstream/metrics;
    }
    location /api/auth/ {
        limit_req zone=general_zone burst=50;
        proxy_pass http://auth_upstream/auth/;
    }

    # ============================================================
    # ITEM SERVICE  (/api/items/*, /api/master-data/* -> :8002)
    # ============================================================
    location = /api/items/health {
        proxy_pass http://item_upstream/health;
    }
    location = /api/items/metrics {
        proxy_pass http://item_upstream/metrics;
    }
    location /api/items/ {
        limit_req zone=general_zone burst=50;
        proxy_pass http://item_upstream/items/;
    }
    location /api/master-data/ {
        limit_req zone=general_zone burst=50;
        proxy_pass http://item_upstream/master-data/;
    }

    # ============================================================
    # ENGAGEMENT SERVICE  (/api/claims/*, /api/notifications/*,
    #                      /api/status -> :8003)
    # ============================================================
    location = /api/engagement/health {
        proxy_pass http://engagement_upstream/health;
    }
    location = /api/engagement/metrics {
        proxy_pass http://engagement_upstream/metrics;
    }
    location = /api/status {
        proxy_pass http://engagement_upstream/status;
    }
    location /api/claims/ {
        limit_req zone=general_zone burst=50;
        proxy_pass http://engagement_upstream/claims/;
    }
    location /api/notifications/ {
        limit_req zone=general_zone burst=50;
        proxy_pass http://engagement_upstream/notifications/;
    }

    # ============================================================
    # FRONTEND (everything else -> frontend:80, SPA)
    # ============================================================
    location / {
        proxy_pass http://frontend_upstream;
    }

    # ---- 429 JSON response (DEC-023) ----
    error_page 429 = @too_many_requests;
    location @too_many_requests {
        default_type application/json;
        add_header X-Correlation-ID $correlation_id always;
        return 429 '{"detail":"Too many requests"}';
    }
}
